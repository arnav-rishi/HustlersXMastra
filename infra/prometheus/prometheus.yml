global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    metrics_path: /metrics

  - job_name: "lexguard-api"
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics
