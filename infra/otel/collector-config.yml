receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  resource:
    attributes:
      - action: insert
        key: deployment.environment
        value: development

exporters:
  otlp/jaeger:
    # ${env:VAR} is the collector's native env-var substitution syntax
    # (resolved at container startup, not build time) — lets the same config
    # file work unmodified in both docker-compose (JAEGER_ENDPOINT=jaeger:4317)
    # and Azure Container Apps (set to Jaeger's internal FQDN).
    endpoint: ${env:JAEGER_ENDPOINT}
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: lexguard
  logging:
    loglevel: warn

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8889
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/jaeger, logging]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, logging]
